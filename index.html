<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Velocity Circuit — 3D Racing</title>
<style>
  :root { --hud-font: "Segoe UI", system-ui, -apple-system, sans-serif; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas#game { display: block; width: 100%; height: 100%; }

  .hud { position: absolute; color: #fff; font-family: var(--hud-font);
         user-select: none; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.6); }

  #speedo { right: 24px; bottom: 20px; text-align: right; }
  #speedo .num { font-size: 56px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  #speedo .unit { font-size: 14px; letter-spacing: 2px; opacity: .8; }
  #speedo .nitro { font-size: 20px; letter-spacing: 4px; color: #38d6ff; margin-top: 4px; }

  #raceinfo { left: 24px; top: 18px; font-size: 16px; }
  #raceinfo .big { font-size: 30px; font-weight: 800; }
  #raceinfo .pos { font-size: 24px; font-weight: 700; color: #ffd34d; }
  #raceinfo div { margin-bottom: 2px; font-variant-numeric: tabular-nums; }

  #minimap { position: absolute; right: 20px; top: 18px; width: 170px; height: 170px;
             background: rgba(0,0,0,.35); border-radius: 10px; }

  #center { left: 50%; top: 34%; transform: translate(-50%, -50%); text-align: center; }
  #center .count { font-size: 110px; font-weight: 900; color: #ffd34d;
                   text-shadow: 0 4px 18px rgba(0,0,0,.7); }

  #results { left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center;
             background: rgba(10, 14, 24, .82); border-radius: 16px; padding: 28px 48px;
             display: none; pointer-events: none; }
  #results h1 { margin: 0 0 10px; font-size: 40px; color: #ffd34d; }
  #results table { margin: 12px auto; border-collapse: collapse; font-size: 17px; }
  #results td { padding: 3px 14px; text-align: left; font-variant-numeric: tabular-nums; }
  #results .hint { margin-top: 14px; font-size: 14px; opacity: .8; }

  #help { left: 24px; bottom: 16px; font-size: 13px; opacity: .75; line-height: 1.5; }
  #wrong { left: 50%; top: 18%; transform: translateX(-50%); font-size: 26px; font-weight: 800;
           color: #ff5544; display: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="raceinfo" class="hud">
  <div class="big" id="lap">LAP 1/3</div>
  <div class="pos" id="pos">POS 5/5</div>
  <div id="time">TIME 0:00.000</div>
  <div id="last">LAST --:--.---</div>
  <div id="best">BEST --:--.---</div>
</div>

<div id="speedo" class="hud">
  <div class="num" id="speed">0</div>
  <div class="unit">KM/H</div>
  <div class="nitro" id="nitro">◇◇◇</div>
</div>

<canvas id="minimap" width="170" height="170"></canvas>

<div id="center" class="hud"><div class="count" id="count"></div></div>
<div id="wrong" class="hud">WRONG WAY!</div>

<div id="results" class="hud">
  <h1 id="resTitle">FINISH!</h1>
  <table id="resTable"></table>
  <div class="hint">Press <b>Enter</b> to race again</div>
</div>

<div id="help" class="hud">
  <b>W/↑</b> gas &nbsp; <b>S/↓</b> brake/reverse &nbsp; <b>A·D/←·→</b> steer &nbsp;
  <b>Space</b> handbrake &nbsp; <b>Shift</b> nitro &nbsp; <b>C</b> camera &nbsp; <b>R</b> reset car &nbsp; <b>M</b> sound
</div>

<div id="fatal" class="hud" style="left:50%;top:50%;transform:translate(-50%,-50%);
     background:rgba(120,20,20,.92);padding:20px 30px;border-radius:10px;display:none;
     max-width:70%;font-size:15px;line-height:1.5"></div>

<script>
  // Surface failures instead of leaving a frozen-looking page.
  function fatal(msg) {
    const el = document.getElementById('fatal');
    el.style.display = 'block';
    el.innerHTML = '<b>Something went wrong:</b><br>' + msg;
  }
  addEventListener('error', e => fatal((e.message || e.type) +
    (e.filename ? '<br><small>' + e.filename + ':' + e.lineno + '</small>' : '')), true);
  addEventListener('unhandledrejection', e => fatal(String(e.reason)));
  try {
    const test = document.createElement('canvas');
    if (!test.getContext('webgl2') && !test.getContext('webgl'))
      fatal('WebGL is not available in this browser. The game needs WebGL to render.');
  } catch (err) { fatal('WebGL check failed: ' + err.message); }
</script>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
<script type="module" src="./game.js"></script>
</body>
</html>
